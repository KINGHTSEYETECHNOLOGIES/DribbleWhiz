<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — DribbleWhiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0e0e12; --surface:#16161c; --surface2:#1e1e26; --border:#2a2a36; --electric:#4f6fff; --electric-bright:#7b93ff; --cyan:#00d4c8; --white:#f0eef8; --muted:#7a7890; --pill-bg:rgba(79,111,255,0.12); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--white); font-family:'Space Grotesk',sans-serif; font-size:16px; line-height:1.6; }
    header { background:var(--surface); border-bottom:1px solid var(--border); }
    .header-inner { max-width:1200px; margin:0 auto; padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:var(--white); text-decoration:none; }
    .logo-accent { color:var(--electric); }
    nav a { font-size:13px; font-weight:500; color:var(--muted); text-decoration:none; padding:7px 14px; border-radius:8px; transition:color 0.2s; }
    nav a:hover { color:var(--white); }
    .page-hero { max-width:1200px; margin:0 auto; padding:52px 28px 0; }
    .page-title { font-family:'Syne',sans-serif; font-size:42px; font-weight:800; letter-spacing:-1px; }
    .page-title span { color:var(--electric); }
    .page-sub { font-size:16px; color:var(--muted); margin-top:12px; }
    .articles-grid { max-width:1200px; margin:40px auto 80px; padding:0 28px; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
    .article-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.2s, transform 0.2s; text-decoration:none; display:block; }
    .article-card:hover { border-color:var(--electric); transform:translateY(-2px); }
    .article-card-bar { height:3px; background:linear-gradient(90deg,var(--electric),var(--cyan)); }
    .article-card-body { padding:22px; }
    .article-cat { display:inline-block; background:var(--pill-bg); color:var(--electric-bright); font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:100px; margin-bottom:12px; }
    .article-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; line-height:1.3; margin-bottom:10px; color:var(--white); }
    .article-excerpt { font-size:13px; color:var(--muted); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .article-date { font-size:11px; color:#444; margin-top:14px; }
    .loading { color:var(--muted); padding:40px 28px; font-size:15px; }
    footer { background:var(--surface); border-top:1px solid var(--border); }
    .footer-bottom { max-width:1200px; margin:0 auto; padding:20px 28px; display:flex; justify-content:space-between; font-size:12px; color:#444; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/">Dribble<span class="logo-accent">Whiz</span></a>
    <nav><a href="/">← Home</a></nav>
  </div>
</header>
<div class="page-hero">
  <h1 class="page-title">All <span>Articles</span></h1>
  <p class="page-sub">Every guide we've published — newest first.</p>
</div>
<div class="articles-grid" id="articles-grid">
  <div class="loading">Loading articles…</div>
</div>
<footer>
  <div class="footer-bottom">
    <a href="/" style="color:#555;text-decoration:none;">← DribbleWhiz Home</a>
    <span>© 2025 DribbleWhiz</span>
  </div>
</footer>
<script>
  fetch('/blog/manifest.json').then(r=>r.json()).then(articles=>{
    const grid = document.getElementById('articles-grid');
    if(!articles.length){ grid.innerHTML='<div class="loading">No articles yet.</div>'; return; }
    grid.innerHTML = articles.map(a=>`
      <a href="/blog/${a.file}" class="article-card">
        <div class="article-card-bar"></div>
        <div class="article-card-body">
          <div class="article-cat">${a.category}</div>
          <div class="article-title">${a.title}</div>
          <div class="article-excerpt">${a.excerpt}</div>
          <div class="article-date">${a.date}</div>
        </div>
      </a>`).join('');
  }).catch(()=>{ document.getElementById('articles-grid').innerHTML='<div class="loading">Could not load articles.</div>'; });
</script>
</body>
</html>
